<section
  class="guarantee-section"
  [class.visible]="isVisible"
  aria-labelledby="guarantee-heading"
>
  <div class="guarantee-inner">

    <div class="seal" aria-hidden="true">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <path d="M9 12l2 2 4-4"/>
      </svg>
    </div>

    <h2 class="guarantee-headline" id="guarantee-heading">
      Não gostou? <span class="accent-serif">Refaço de graça.</span>
    </h2>

    <p class="guarantee-text">
      Você tem <strong>15 dias após a entrega</strong> pra pedir ajustes ou reescrever o projeto do zero —
      sem custo extra. Quero seu negócio vendendo, não a fatura paga.
    </p>

    <ul class="guarantee-points" role="list">
      <li>
        <svg class="check" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Suporte direto comigo, sem fila
      </li>
      <li>
        <svg class="check" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Código seu — sem dependência de plataforma
      </li>
      <li>
        <svg class="check" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Pagamento parcelado em até 12x
      </li>
    </ul>

  </div>
</section>
